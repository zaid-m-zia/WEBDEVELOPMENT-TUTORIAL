<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Understanding Checkbox radio range and dropbox attributes in the input tag
      under form tag
    </title>
  </head>
  <body>
    <div>
      <form action="/server.html">
        <div>
          <label for="name">Name :</label>
          <input type="text" name="" id="name" placeholder="Enter your name" />
        </div>
        <!--checkbox-->
        <div>
          choose your subjects :
          <label for="opt1">maths</label>
          <input type="checkbox" name="sub" value="maths" id="opt1" checked />
          <label for="opt2">science</label>
          <input type="checkbox" name="sub" value="science" id="opt2" />
          <label for="opt3">english</label>
          <input type="checkbox" name="sub" value="english" id="opt3" />
        </div>

        <!--radio-->
        <div>
          Select Your Gender :
          <label for="M">Male</label>
          <input type="radio" id="M" name="Gender" value="purush" checked />
          <label for="F">Female</label>
          <input type="radio" id="F" name="Gender" value="mahila" />
        </div>
        <!--dropbox-->
        <div>
          Select your college :
          <select name="college" id="">
            <option selected>Choose an option</option>
            <option value="amity">Amity University Noida</option>
            <option value="sharda">Sharda University</option>
            <option value="tub">Technical University of Berlin</option>
          </select>
        </div>
        <!--range-->
        <div>
          <label for="volume">volume :</label>
                <input id="volume" name="vol" type="range" min="0" max="100" step="10" value="5"/>
        </div>
        <!--textarea-->
        <div>
          <label for="message">Type in your Message :</label>
          <textarea name="msg" id="message" placeholder="Write Your Feedback Here" rows="10" cols="30"></textarea>
        </div>

        <div>
          <button type="submit">submit</button>
        </div>
      </form>
    </div>
  </body>
</html>
