<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to tables</title>
</head>
<body>
    
    <table border="9">
        <caption>University</caption>
        <thead> <!--wraps the header of the table-->
            <tr>
                <th>Name</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody><!--wraps the body of the table-->
            <tr>
                <td>Technical University of Berlin</td>
                <td>100</td>
            </tr>
            <tr>
                <td>Technical University of Munich</td>
                <td>20</td>
            </tr>
            <tr>
                <td>University of Achen</td>
                <td>60</td>
            </tr>
        </tbody>
      
    </table>



</body>
</html>
