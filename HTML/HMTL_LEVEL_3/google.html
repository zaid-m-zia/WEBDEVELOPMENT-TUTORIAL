<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google URL hit</title>
</head>
<body>
<h1>Universal Seach engine</h1>

    <div>
        <h2>Google</h2>
    </div>


    <div>
        <form action="https://www.google.com/search">
            <div>
                <label for="Searching google">Search :</label>
                <input id="Searching google" name="q" type="text">
                <button type="submit">Click Me To Search on Google !</button>
            </div>
        </form>
    </div>

<hr/>

    <div>
        <h2>Youtube</h2>
    </div>


    <div>
        <form action="https://www.youtube.com/search">
            <div>
                <label for="Searching youtube">Search :</label>
                <input id="Searching youtube" name="search_query" type="text">
                <button type="submit" >Click Me To Search on Youtube !</button>
            </div>
        </form>
    </div>
<hr/>
<br/>
    <h2>ChatGPT</h2>
    <div>
    <form action="https://chatgpt.com/">
        <div>
            <label for="Searching gpt">Ask ChatGPT :</label>
            <input id="Searching gpt" name="q" type="text">
            <button type="submit">Click Me To Ask ChatGPT!</button>
        </div>
    </form>
</div>



</body>
</html>
