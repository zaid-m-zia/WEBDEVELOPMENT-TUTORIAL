<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in html</title>
</head>
<body>
    <form action="/server">
        <div>
            <input type="button" value="Click me"/>
            <input type="submit" value="submit input button"/>
        </div>

        <div>
            <label>
            Username
            <input type="text" placeholder="Username"/>
        </label>
        </div>
        <div>
            <label>
            Age
            <input type="number" placeholder="Age"/>
        </label>
        </div>
        <div>
           <label>
            Time
            <input type="time" placeholder="Time"/>
        </label> 
        </div>
        <div>
            <label>
            Date
            <input type="date" placeholder="Date"/>
        </label>
        </div>
        
        <div>
            <label for="password">Enter Your Password</label>
            <input id="password" placeholder="Password"/>
        </div>
        <div>

            <button type="submit">Submit</button> <!--submits the form data-->
            <button type="button">do something</button><!--just a normal button (wont submit)-->
            <button type="reset">do something</button> <!--resets everything in the form-->
        </div>
        
        
    </form>
</body>
</html>
